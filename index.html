<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Підключення стилів -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="style.css" />

    <title>Notes</title>
  </head> 
  <body>

    <body>
      <header>
        <h1><i class="fas fa-sticky-note"></i> Super notes</h1>
        <nav class="main-nav">
          <button id="show-active-btn" class="nav-btn nav-active">📝 Нотатки</button>
          <button id="show-archive-btn" class="nav-btn">📦 Архів</button>
        </nav>
      </header>
      <main>
        <div class="notes-grid" id="notes-container"></div>
      </main>
      <button id="open-modal-btn" class="fab-btn"><i class="fas fa-plus"></i></button>
      <div id="note-modal" class="modal">
        <div class="modal-content">
          <div class="mac-controls">
            <span class="mac-btn mac-close" id="mac-close" title="Закрити"><i class="fas fa-times"></i></span>
            <span class="mac-btn mac-minimize" title="Згорнути"><i class="fas fa-window-minimize"></i></span>      
            <span class="mac-btn mac-maximize" title="Розгорнути"><i class="fas fa-expand-alt"></i></span>
          </div>
          <button class="restore-btn" title="Розгорнути вікно">
            <i class="fas fa-window-restore"></i>
          </button>
          <button id="toggle-type-btn">                                    
            <i class="fas fa-list-ul"></i> Зробити списком завдань         
          </button> 
          
          <input name="" placeholder="Введіть якийсь заголовок...." id="modal-title">
          <textarea name="" id="modal-text" placeholder="Введіть якісь нотатки...."></textarea>
          <div id="modal-list" style="display:none;">                      
            <div id="list-items-container"></div>                          
            <button type="button" id="add-list-item-btn">+ Додати пункт</button>                                                       
          </div>
          <div class="modal-actions">
            <button id="save-note-btn">Зберегти</button>
          </div>
        </div>
      </div>

      
      <!-- Підключення FontAwesome для використання текстових іконок -->
    <!-- <script
      src="https://use.fontawesome.com/releases/v5.15.4/js/all.js"
      integrity="sha384-rOA1PnstxnOBLzCLMcre8ybwbTmemjzdNlILg8O7z1lUkLXozs4DHonlDtnE7fpc"
      crossorigin="anonymous"
    ></script> -->

    <!-- Підключення jQuery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

    <!-- Підключення локального скрипта -->
    <script src="script.js"></script>
  </body>
</html>
